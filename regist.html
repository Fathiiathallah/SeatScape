<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ICON -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- FONT Playfair -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <title>AdoreU Space</title>
  <link rel="stylesheet" href="registration.css">
</head>

<body>

  <!-- MAIN -->
  <div class="wrapper">

    <!-- TEXT ATAS -->
    <div class="welcome-text">
            <h1>Hello there,</h1>
            <p>Welcome Back to Seatscape!</p> 
        </div>

    <!-- CARD -->
    <div class="card">

      <h3>Registration</h3>
      <p class="login-text">Already have an account? <a href="../Login Section/index_login.html">Login</a></p>

      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" placeholder="Username" required>
      </div>

      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <i class="fas fa-eye"></i>
        <input type="password" placeholder="Password" required>
      </div>

      <button type="submit" class="btn-login"><a href="../Landing Page/landingpage.html">Register</a></button>
      <button type="button" class="btn-back"><a href="../Landing Page/landingpage.html">Back to home</a></button>

    </div>

  </div>

</body>
</html>
