<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdoreU Space - Login</title>
    <link rel="stylesheet" href="./css/styles_login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <main class="main-wrapper">
        <div class="welcome-text">
            <h1>Hello there,</h1>
            <p>Welcome Back to Seatscape!</p> 
        </div>

        <section class="login-card">
            <h3>Login</h3>
            <p class="subtitle">Don't have an account? <a href="regist.html">Register</a></p>
            
            <form>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="input-name" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-eye"></i>
                    <input type="password" id="input-password" placeholder="Password" required>
                </div>
                
                <button type="button" class="btn-login" onclick="handleLogin()">Login</button>
                <button type="button" class="btn-back"><a href="index.html">Back to home</a></button>
            </form>
        </section>
    </main>

    <script>
    function handleLogin() {
        // 1. Ambil nama dari input username 
        // (Pastikan ID input username kamu adalah id="username", ubah kalau beda ya)
        const usernameInput = document.getElementById('username');
        
        // Kalau inputnya ketemu dan ada isinya, pakai itu. Kalau kosong, pakai "Guest"
        let userName = "Guest User";
        if (usernameInput && usernameInput.value !== "") {
            userName = usernameInput.value;
        }

        // 2. Buat email bohongan dari username (karena di form loginmu nggak ada input email)
        // Hapus spasi dan jadikan huruf kecil semua, misal: "Fathi" jadi "fathi@gmail.com"
        let userEmail = userName.replace(/\s+/g, '').toLowerCase() + "@gmail.com";

        // 3. Simpan ke Session Storage
        sessionStorage.setItem('loggedInName', userName);
        sessionStorage.setItem('loggedInEmail', userEmail);

        // 4. Pindah ke halaman Home
        window.location.href = 'index.html'; 
    }
    </script>
</body>
</html>
