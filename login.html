<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdoreU Space - Login</title>
    <link rel="stylesheet" href="../css/styles_login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <main class="main-wrapper">
        <div class="welcome-text">
            <h1>Hello there,</h1>
            <p>Welcome Back to Seatscape!</p> 
        </div>

        <section class="login-card">
            <h3>Login</h3>
            <p class="subtitle">Don't have an account? <a href="regist.html">Register</a></p>
            
            <form>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-eye"></i>
                    <input type="password" placeholder="Password" required>
                </div>

                <!-- FORGOT PASSWORD -->
                <div class="forgot">
                    <a href="#">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-login"><a href="index.html">Login</a></button>
                <button type="button" class="btn-back"><a href="index.html">Back to home</a></button>
            </form>
        </section>
    </main>

</body>
</html>
